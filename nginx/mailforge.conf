# /etc/nginx/sites-available/mailforge
# Symlink to sites-enabled:
#   sudo ln -s /etc/nginx/sites-available/mailforge /etc/nginx/sites-enabled/mailforge
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name 52.66.246.131;   # ← replace with your domain or droplet IP

    # Redirect HTTP → HTTPS (uncomment after setting up SSL with Certbot)
    # return 301 https://$host$request_uri;

    # ── Frontend — serve React build ─────────────────────────────
    root /var/www/mailforge/client;
    index index.html;

    # All non-API routes → React app (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API — proxy to Node.js ───────────────────────────
    location /api/ {
        rewrite ^/api/(.*) /$1 break;    # strip /api prefix before forwarding
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # ── Gzip compression ─────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── Security headers ─────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header Referrer-Policy       "strict-origin" always;
}

