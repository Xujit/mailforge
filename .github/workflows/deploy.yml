name: Deploy MailForge

on:
  push:
    branches:
      - main        # deploy on every push to main
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Run tests before deploying
  # ────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Start backend + run tests
        working-directory: backend
        env:
          JWT_SECRET: test_secret_for_ci
          ADMIN_KEY: admin_test_key
          PORT: 3000
        run: |
          node src/index.js &
          sleep 2
          ADMIN_KEY=admin_test_key node tests/test.js

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Build frontend
  # ────────────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package.json

      - name: Install frontend dependencies
        working-directory: client
        run: npm ci

      - name: Build frontend
        working-directory: client
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}   # e.g. https://yourdomain.com
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to DigitalOcean VPS
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, build-frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend build
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

      - name: Copy frontend build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          source:   client/dist/*
          target:   /var/www/mailforge/client/
          strip_components: 2   # removes "client/dist" prefix

      - name: Deploy backend + restart services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            APP_DIR=/var/www/mailforge

            echo "▶ Pulling latest code..."
            cd $APP_DIR
            git pull origin main

            echo "▶ Installing backend dependencies..."
            cd $APP_DIR/backend
            npm ci --omit=dev

            echo "▶ Reloading backend via PM2..."
            # Start if not running, reload (zero-downtime) if already running
            pm2 describe mailforge-api > /dev/null 2>&1 \
              && pm2 reload mailforge-api --update-env \
              || pm2 start ecosystem.config.js

            pm2 save

            echo "▶ Reloading Nginx..."
            sudo nginx -t && sudo systemctl reload nginx

            echo "✅ Deploy complete!"
