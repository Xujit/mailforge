name: Deploy MailForge

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  APP_DIR: /var/www/mailforge
  NGINX_WEBROOT: /var/www/mailforge/client

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Run backend tests
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 3000
          ADMIN_KEY: admin_test_key
          APP_URL: http://localhost:5173
          CLIENT_URL: http://localhost:5173
          DB_PATH: data/test.sqlite
          # No FIREBASE_SERVICE_ACCOUNT needed — Firebase is fully stubbed
          # in test mode. verifyIdToken() uses test_token_* format instead.
        run: |
          mkdir -p data
          node src/index.js &
          SERVER_PID=$!
          sleep 3
          ADMIN_KEY=admin_test_key node tests/test.js
          kill $SERVER_PID

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Build frontend
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package.json

      - name: Install frontend deps
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL:                      ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy to VPS
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

      - name: Upload frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          source:   "client/dist/"
          target:   "/var/www/mailforge/client_upload"

      - name: Deploy backend + activate frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo "================================================"
            echo "  MailForge Deploy — $(date '+%Y-%m-%d %H:%M:%S')"
            echo "================================================"

            echo "▶ [1/5] Pulling latest code..."
            cd /var/www/mailforge
            git fetch origin main
            git reset --hard origin/main

            echo "▶ [2/5] Installing backend dependencies..."
            cd /var/www/mailforge/backend
            npm ci --omit=dev --prefer-offline

            echo "▶ [3/5] Reloading backend (PM2)..."
            cd /var/www/mailforge
            pm2 describe mailforge-api > /dev/null 2>&1 \
              && pm2 reload mailforge-api --update-env \
              || pm2 start ecosystem.config.js --env production
            pm2 save

            echo "▶ [4/5] Activating new frontend build..."
            rm -rf /var/www/mailforge/client
            mv /var/www/mailforge/client_upload/client/dist /var/www/mailforge/client
            rm -rf /var/www/mailforge/client_upload

            echo "▶ [5/5] Configuring Nginx..."
            sudo cp /var/www/mailforge/nginx/mailforge.conf /etc/nginx/sites-available/mailforge
            sudo ln -sf /etc/nginx/sites-available/mailforge /etc/nginx/sites-enabled/mailforge
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t && sudo systemctl reload nginx

            echo ""
            echo "✅ Deploy complete!"
            echo "   Frontend: $(ls /var/www/mailforge/client | wc -l) files in webroot"
            echo "   URL: http://${{ secrets.VPS_HOST }}"
