name: Deploy MailForge

on:
  push:
    branches:
      - main         # auto-deploy on every push to main
  workflow_dispatch: # allow manual trigger from GitHub UI

env:
  APP_DIR: /var/www/mailforge
  NGINX_WEBROOT: /var/www/mailforge/client

jobs:
  # ────────────────────────────────────────────────────────────────
  # JOB 1 — Run backend tests
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 3000
          JWT_SECRET: ci_test_secret_not_for_production
          ADMIN_KEY: admin_test_key
        run: |
          node src/index.js &
          SERVER_PID=$!
          sleep 2
          ADMIN_KEY=admin_test_key node tests/test.js
          kill $SERVER_PID

  # ────────────────────────────────────────────────────────────────
  # JOB 2 — Build frontend
  # ────────────────────────────────────────────────────────────────
  build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install frontend deps
        working-directory: client
        run: npm ci

      - name: Build
        working-directory: client
        env:
          # Vite bakes this into the bundle at build time
          # Points to your VPS domain so API calls work in production
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/
          retention-days: 1

  # ────────────────────────────────────────────────────────────────
  # JOB 3 — Deploy BOTH backend + frontend to the same VPS
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:


      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: client/dist/

      # ── Step 1: Upload frontend build to VPS via SCP ────────────
      # Copies client/dist/* → /var/www/mailforge/client/
      # Nginx serves this directory as the static web root
      - name: Upload frontend to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          source:   "client/dist/"
          target:   "${{ env.APP_DIR }}/client_upload"

      # ── Step 2: SSH in — pull backend, install deps, restart ────
      - name: Deploy backend + activate frontend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          port:     ${{ secrets.VPS_PORT }}
          script: |
            set -e

            echo ""
            echo "════════════════════════════════════════"
            echo "  MailForge Deploy — $(date '+%Y-%m-%d %H:%M:%S')"
            echo "════════════════════════════════════════"

            # ── Backend: pull latest code ─────────────────────────
            echo "▶ [1/5] Pulling latest code..."
            cd ${{ env.APP_DIR }}
            git fetch origin main
            git reset --hard origin/main

            # ── Backend: install production dependencies ──────────
            echo "▶ [2/5] Installing backend dependencies..."
            cd ${{ env.APP_DIR }}/backend
            npm ci --omit=dev --prefer-offline

            # ── Backend: zero-downtime reload via PM2 ─────────────
            # pm2 reload does a rolling restart — no downtime
            echo "▶ [3/5] Reloading backend (PM2)..."
            cd ${{ env.APP_DIR }}
            pm2 describe mailforge-api > /dev/null 2>&1 \
              && pm2 reload mailforge-api --update-env \
              || pm2 start ecosystem.config.js --env production
            pm2 save

            # ── Frontend: swap in new build atomically ────────────
            # Move uploaded dist into the nginx web root
            # Using mv (atomic on same filesystem) avoids serving half-built files
            echo "▶ [4/5] Activating new frontend build..."
            rm -rf ${{ env.NGINX_WEBROOT }}
            mv ${{ env.APP_DIR }}/client_upload/client/dist ${{ env.NGINX_WEBROOT }}
            rm -rf ${{ env.APP_DIR }}/client_upload

            # ── Nginx: reload config (picks up any conf changes) ──
            echo "▶ [5/5] Reloading Nginx..."
            sudo nginx -t && sudo systemctl reload nginx

            echo ""
            echo "✅ Deploy complete!"
            echo "   Backend:  $(pm2 show mailforge-api | grep status | head -1)"
            echo "   Frontend: $(ls ${{ env.NGINX_WEBROOT }} | wc -l) files in webroot"
            echo ""
